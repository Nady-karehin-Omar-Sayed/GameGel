<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Game Details</title>

    <link rel="stylesheet" href="../assets/css/variables.css">

    <link rel="stylesheet" href="../assets/css/style.css">

    <link rel="stylesheet" href="../assets/css/components.css">

    <link rel="stylesheet" href="../assets/css/responsive.css">

</head>

<body>

    <div class="navbar"></div>



    <div class="game-details-container" id="game-details-container">

        <div class="flex-center" style="height:60vh; color: var(--accent-blue); font-family: var(--mono-font);"><span data-key="detail_loading">Loading...</span></div>

    </div>



    <footer>

        <p class="head-font green"><span data-key="copyright_footer">© 2026 GameGel. All rights reserved.</span></p>

    </footer>



    <div class="small-ad" id="small-ad" style="display:none;">

        <div class="small-ad-header">

            <span class="small-ad-label" data-key="small_ad_corner">◆ AD ◆</span>

            <button class="small-ad-close" type="button" onclick="document.getElementById('small-ad').style.display='none'" title="Close">✕</button>

        </div>

        <img id="small-ad-img" src="../assets/images/ad-early-bird.jpg" alt="Advertisement"

             onerror="this.src='https://placehold.co/260x100/111/08CB00?text=Ad'">

    </div>



    <script src="../assets/js/utils.js"></script>

    <script src="../assets/js/navbar.js"></script>

    <script src="../assets/js/cart.js"></script>

    <script>

        function gt(key) {

            return typeof window.getGamegelTranslation === "function"

                ? window.getGamegelTranslation(key)

                : key;

        }



        let currentGame = null;

        let hoveredRating = 0;

        let selectedRating = 0;



        function getWishlist() {

            return JSON.parse(localStorage.getItem('gamegel_wishlist') || '[]');

        }

        function saveWishlist(list) {

            localStorage.setItem('gamegel_wishlist', JSON.stringify(list));

        }

        function isInWishlist(title) {

            return getWishlist().some(t => t === title);

        }

        function toggleWishlist(title) {

            let list = getWishlist();

            const idx = list.indexOf(title);

            if (idx > -1) {

                list.splice(idx, 1);

                Cart.showToast(gt('toast_removed_wishlist'));

            } else {

                list.push(title);

                Cart.showToast(gt('toast_added_wishlist'));

            }

            saveWishlist(list);

            updateWishlistButton();

        }



        function getCompareList() {

            return JSON.parse(localStorage.getItem('gamegel_compare') || '[]');

        }

        function saveCompareList(list) {

            localStorage.setItem('gamegel_compare', JSON.stringify(list));

        }

        function addToCompare(title) {

            let list = getCompareList();

            if (list.length >= 3) {

                Cart.showToast(gt('toast_max_compare'));

                return;

            }

            if (list.includes(title)) {

                Cart.showToast(gt('toast_already_compare'));

                return;

            }

            list.push(title);

            saveCompareList(list);

            Cart.showToast(gt('toast_added_compare'));

        }



        function getReviews(gameTitle) {

            const all = JSON.parse(localStorage.getItem('gamegel_reviews') || '{}');

            return all[gameTitle] || [];

        }

        function saveReviews(gameTitle, reviews) {

            const all = JSON.parse(localStorage.getItem('gamegel_reviews') || '{}');

            all[gameTitle] = reviews;

            localStorage.setItem('gamegel_reviews', JSON.stringify(all));

        }

        function submitReview(gameTitle) {

            const titleInput = document.getElementById('review-title-input');

            const bodyInput = document.getElementById('review-body-input');

            if (!selectedRating) {

                Cart.showToast(gt('toast_pick_rating'));

                return;

            }

            if (!titleInput.value.trim() || !bodyInput.value.trim()) {

                Cart.showToast(gt('toast_review_fields'));

                return;

            }

            const session = JSON.parse(sessionStorage.getItem('app_session') || localStorage.getItem('app_session') || 'null');

            const author = session ? session.email.split('@')[0] : 'Anonymous';



            const reviews = getReviews(gameTitle);

            reviews.unshift({

                author,

                rating: selectedRating,

                title: titleInput.value.trim(),

                body: bodyInput.value.trim(),

                date: new Date().toISOString()

            });

            saveReviews(gameTitle, reviews);

            titleInput.value = '';

            bodyInput.value = '';

            selectedRating = 0;

            renderReviews(gameTitle);

            Cart.showToast(gt('toast_review_saved'));

            refreshReviewStats(gameTitle);

        }



        function renderStarsHTML(rating) {

            let html = '';

            for (let i = 1; i <= 5; i++) {

                html += `<span class="star ${i <= rating ? 'filled' : ''}">&#9733;</span>`;

            }

            return html;

        }



        function renderReviews(gameTitle) {

            const reviews = getReviews(gameTitle);

            const container = document.getElementById('reviews-list');

            if (!container) return;

            if (reviews.length === 0) {

                container.innerHTML = `<p class="no-reviews">${gt('detail_no_reviews')}</p>`;

                return;

            }

            container.innerHTML = reviews.map(r => `

                <div class="review-item">

                    <div class="review-header">

                        <span class="review-author">${r.author}</span>

                        <span class="review-date">${new Date(r.date).toLocaleDateString()}</span>

                    </div>

                    <div class="stars">${renderStarsHTML(r.rating)}</div>

                    <h4 class="review-title">${r.title}</h4>

                    <p class="review-body">${r.body}</p>

                </div>

            `).join('');

        }



        function getAverageRating(gameTitle) {

            const reviews = getReviews(gameTitle);

            if (reviews.length === 0) return 0;

            return reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length;

        }



        function refreshReviewStats(gameTitle) {

            const reviewCountEl = document.getElementById('review-count-chip');

            if (!reviewCountEl || !gameTitle) return;

            reviewCountEl.textContent = gt('reviews_count_fmt').replace('{n}', String(getReviews(gameTitle).length));

        }



        function updateCartButton() {

            const btn = document.getElementById('btn-add-cart');

            if (!btn || !currentGame) return;

            if (Cart.isInCart(currentGame.title)) {

                btn.textContent = gt('in_cart');

                btn.classList.add('in-cart');

            } else {

                btn.textContent = gt('add_to_cart');

                btn.classList.remove('in-cart');

            }

        }



        function updateWishlistButton() {

            const btn = document.getElementById('btn-wishlist');

            if (!btn || !currentGame) return;

            if (isInWishlist(currentGame.title)) {

                btn.textContent = gt('wishlisted');

                btn.classList.add('wishlisted');

            } else {

                btn.textContent = gt('wishlist');

                btn.classList.remove('wishlisted');

            }

        }



        function mockDownload(type) {

            const progressDiv = document.getElementById('download-progress');

            const barFill = document.getElementById('progress-fill');

            const text = document.getElementById('progress-text');

            if (!progressDiv || !barFill || !text) return;

            progressDiv.classList.add('visible');

            let pct = 0;

            const interval = setInterval(() => {

                pct += Math.floor(Math.random() * 15) + 5;

                if (pct >= 100) {

                    pct = 100;

                    clearInterval(interval);

                    text.textContent = type === 'demo' ? gt('demo_downloaded') : gt('download_complete');

                    setTimeout(() => progressDiv.classList.remove('visible'), 2000);

                } else {

                    text.textContent = gt('downloading_pct').replace('{pct}', String(pct));

                }

                barFill.style.width = pct + '%';

            }, 300);

        }



        async function init() {

            const container = document.getElementById('game-details-container');

            const params = new URLSearchParams(window.location.search);

            const gameTitle = params.get('game');



            if (!gameTitle) {

                container.innerHTML = `

                    <div class="not-found">

                        <h1 data-key="detail_not_found_title">Game Not Found</h1>

                        <p data-key="detail_not_found_desc">This game doesn't exist or may have been removed.</p>

                        <a href="./games.html" data-key="detail_browse_games">Browse Games</a>

                    </div>

                `;

                return;

            }



            const response = await fetch('../assets/js/games.json');

            const allGames = await response.json();

            const game = allGames.find(g => g.title.toLowerCase() === gameTitle.toLowerCase());



            if (!game) {

                container.innerHTML = `

                    <div class="not-found">

                        <h1 data-key="detail_not_found_title">Game Not Found</h1>

                        <p data-key="detail_not_found_desc">This game doesn't exist or may have been removed.</p>

                        <a href="./games.html" data-key="detail_browse_games">Browse Games</a>

                    </div>

                `;

                return;

            }



            currentGame = game;

            document.title = `${game.title} - GameGel`;



            const avgRating = getAverageRating(game.title);

            const reviewCount = getReviews(game.title).length;

            const genres = game.genres ? game.genres.split(',').map(g => g.trim()) : [];

            const platforms = game.platforms ? game.platforms.split(',').map(p => p.trim()) : [];

            const tags = [...genres.slice(0, 3), ...platforms.slice(0, 2)];



            const relatedGames = allGames

                .filter(g => g.title.toLowerCase() !== game.title.toLowerCase() &&

                    g.genres && genres.some(tag => g.genres.toLowerCase().includes(tag.toLowerCase())))

                .slice(0, 4);



            const session = JSON.parse(sessionStorage.getItem('app_session') || localStorage.getItem('app_session') || 'null');

            const isLoggedIn = !!session;



            container.innerHTML = `

                <div class="breadcrumb">

                    <a href="../index.html" data-key="breadcrumb_home">Home</a> &rsaquo;

                    <a href="./games.html" data-key="breadcrumb_games">Games</a> &rsaquo;

                    <span>${game.title}</span>

                </div>



                <div class="game-hero">

                    <img src="${game.image}" alt="${game.title}" onerror="this.src='https://placehold.co/1100x400/111/08CB00?text=${encodeURIComponent(game.title)}'">

                    <div class="game-hero-overlay">

                        <h1>${game.title}</h1>

                        <span class="developer-tag">${gt('detail_by_developer')} ${game.developer}</span>

                    </div>

                </div>



                <div class="game-layout">

                    <div class="game-main">

                        <div class="game-tags">

                            ${tags.map(t => `<span class="game-tag">${t}</span>`).join('')}

                        </div>



                        <div class="rating-summary">

                            <span class="rating-number">${avgRating > 0 ? avgRating.toFixed(1) : gt('rating_na')}</span>

                            <div class="stars">${renderStarsHTML(Math.round(avgRating))}</div>

                            <span id="review-count-chip" class="review-count"></span>

                        </div>



                        <div class="game-section">

                            <h2 data-key="about_game">About This Game</h2>

                            <p class="game-description">${game.description}</p>

                        </div>



                        <div class="game-section">

                            <h2 data-key="game_features">Game Features</h2>

                            <div style="display: flex; flex-direction: column; gap: 10px;">

                                <div style="color: #eeeeee; font-family: var(--mono-font);"><span style="color: var(--accent-blue);" data-key="lbl_developer">Developer</span>: ${game.developer}</div>

                                <div style="color: #eeeeee; font-family: var(--mono-font);"><span style="color: var(--accent-blue);" data-key="lbl_platforms">Platforms</span>: ${game.platforms}</div>

                                <div style="color: #eeeeee; font-family: var(--mono-font);"><span style="color: var(--accent-blue);" data-key="lbl_genres">Genres</span>: ${game.genres}</div>

                                <div style="color: #eeeeee; font-family: var(--mono-font);"><span style="color: var(--accent-blue);" data-key="lbl_price">Price</span>: ${game.price}</div>

                            </div>

                        </div>



                        <div class="game-section">

                            <h2 data-key="reviews_heading">Reviews</h2>

                            ${isLoggedIn ? `

                                <button type="button" onclick="toggleReviewForm()" data-key="write_review" style="background: var(--accent-blue); color: var(--base-bg); border: none; padding: 8px 16px; border-radius: 6px; font-family: var(--mono-font); cursor: pointer; margin-bottom: 15px;">Write a Review</button>

                                <div class="review-form" id="review-form">

                                    <h3 data-key="rate_this_game">Rate this game</h3>

                                    <div class="stars" id="star-widget" style="margin-bottom: 10px;">

                                        ${[1,2,3,4,5].map(n => `<span class="star" data-rating="${n}" onclick="setRating(${n})" onmouseover="hoverRating(${n})" onmouseout="unhoverRating()">&#9733;</span>`).join('')}

                                    </div>

                                    <input type="text" id="review-title-input" placeholder="" data-key="review_title_ph">

                                    <textarea id="review-body-input" placeholder="" data-key="review_body_ph"></textarea>

                                    <button type="button" onclick="submitReview('${game.title.replace(/'/g, "\\'")}')" data-key="submit_review">Submit Review</button>

                                </div>

                            ` : `

                                <p style="color: #888; font-family: var(--mono-font); font-size: 0.85rem; margin-bottom: 15px;">

                                    <a href="./login.html" style="color: var(--accent-blue);"><span data-key="nav_login">Login</span></a>&nbsp;<span data-key="review_suffix_after_login">to write a review.</span>

                                </p>

                            `}

                            <div id="reviews-list"></div>

                        </div>



                        ${relatedGames.length > 0 ? `

                            <div class="game-section">

                                <h2 data-key="more_like_this">More Like This</h2>

                                <div class="related-games-grid">

                                    ${relatedGames.map(g => `

                                        <a href="./game-details.html?game=${encodeURIComponent(g.title)}" class="related-game-card">

                                            <img src="${g.image}" alt="${g.title}" onerror="this.src='https://placehold.co/220x130/111/08CB00?text=${encodeURIComponent(g.title)}'">

                                            <div class="card-info">

                                                <h4>${g.title}</h4>

                                                <span class="card-price">${g.price}</span>

                                            </div>

                                        </a>

                                    `).join('')}

                                </div>

                            </div>

                        ` : ''}

                    </div>



                    <aside class="game-sidebar">

                        <div class="buy-card">

                            <div class="buy-price ${game.price.toLowerCase().includes('free') ? 'free' : ''}">${game.price}</div>



                            <a href="${game.buyLink}" target="_blank" class="btn-buy" data-key="buy_now">Buy Now</a>

                            <button type="button" class="btn-demo" onclick="mockDownload('demo')" data-key="download_demo">Download Demo</button>

                            <button type="button" class="btn-cart" id="btn-add-cart" onclick="Cart.addToCart(currentGame)" data-key="add_to_cart">Add to Cart</button>

                            <div class="download-progress" id="download-progress">

                                <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>

                                <div class="progress-text" id="progress-text"></div>

                            </div>



                            <div class="sidebar-actions">

                                <button type="button" id="btn-wishlist" onclick="toggleWishlist('${game.title.replace(/'/g, "\\'")}')" data-key="wishlist">Wishlist</button>

                                <a href="./compare.html" class="btn-compare" data-key="compare_link">Compare</a>

                            </div>



                            <div class="sidebar-info">

                                <div class="sidebar-info-row"><span class="label" data-key="lbl_developer">Developer</span><span class="value">${game.developer}</span></div>

                                <div class="sidebar-info-row"><span class="label" data-key="lbl_platforms">Platforms</span><span class="value">${game.platforms}</span></div>

                                <div class="sidebar-info-row"><span class="label" data-key="lbl_genre">Genre</span><span class="value">${game.genres}</span></div>

                            </div>



                            <div class="share-row">

                                <p data-key="share_game">Share this game</p>

                                <div class="share-buttons">

                                    <a class="share-btn" href="https://twitter.com/intent/tweet?text=Check out ${encodeURIComponent(game.title)} on GameGel!&url=${encodeURIComponent(window.location.href)}" target="_blank" data-key="twitter">Twitter</a>

                                    <a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" data-key="facebook">Facebook</a>

                                    <button type="button" class="share-btn" onclick="navigator.clipboard.writeText(window.location.href); Cart.showToast(gt('toast_link_copied'))" data-key="copy_link">Copy Link</button>

                                </div>

                            </div>

                        </div>

                    </aside>

                </div>

            `;



            const pt = document.getElementById('progress-text');

            if (pt) pt.textContent = gt('downloading_pct').replace('{pct}', '0');



            renderReviews(game.title);

            refreshReviewStats(game.title);

            updateCartButton();

            updateWishlistButton();



            document.querySelectorAll('#review-title-input[data-key], #review-body-input[data-key]').forEach(el => {

                const key = el.getAttribute('data-key');

                if (typeof window.getGamegelTranslation === 'function' && key) {

                    el.placeholder = window.getGamegelTranslation(key);

                }

            });



            setTimeout(() => {

                if (typeof window.applyTranslationsFromDict === 'function' && typeof window.getTranslationsObject === 'function') {

                    window.applyTranslationsFromDict(window.getTranslationsObject());

                }

                refreshReviewStats(game.title);

            }, 0);

        }



        function toggleReviewForm() {

            const form = document.getElementById('review-form');

            if (form) form.classList.toggle('visible');

        }



        function setRating(n) {

            selectedRating = n;

            document.querySelectorAll('#star-widget .star').forEach((star, i) => {

                star.classList.toggle('filled', i < n);

            });

        }



        function hoverRating(n) {

            hoveredRating = n;

            document.querySelectorAll('#star-widget .star').forEach((star, i) => {

                star.classList.toggle('hovered', i < n);

            });

        }



        function unhoverRating() {

            hoveredRating = 0;

            document.querySelectorAll('#star-widget .star').forEach((star, i) => {

                star.classList.remove('hovered');

                star.classList.toggle('filled', i < selectedRating);

            });

        }



        document.addEventListener('languageChanged', () => {

            if (!currentGame) return;

            updateCartButton();

            updateWishlistButton();

            refreshReviewStats(currentGame.title);

            const pt = document.getElementById('progress-text');

            if (pt && !pt.closest('.download-progress.visible')) {

                pt.textContent = gt('downloading_pct').replace('{pct}', '0');

            }

            const rlist = document.getElementById('reviews-list');

            if (rlist && !rlist.querySelector('.review-item')) {

                renderReviews(currentGame.title);

            }

            document.querySelectorAll('#review-title-input[data-key], #review-body-input[data-key]').forEach(el => {

                const key = el.getAttribute('data-key');

                if (typeof window.getGamegelTranslation === 'function' && key) {

                    el.placeholder = window.getGamegelTranslation(key);

                }

            });

            const bt = document.getElementById('small-ad')?.querySelector('.small-ad-close');

            if (bt) bt.title = gt('ad_close_title');

        });



        init();



        (function () {

            const adImages = [

                '../assets/images/ad-early-bird.jpg',

                '../assets/images/ad-big-games.jpg',

                '../assets/images/ad-fc26.jpg'

            ];

            let adIndex = Math.floor(Math.random() * adImages.length);

            const adEl  = document.getElementById('small-ad');

            const adImg = document.getElementById('small-ad-img');



            function showAd(index) {

                adImg.style.opacity = '0';

                setTimeout(() => {

                    adImg.src = adImages[index];

                    adImg.style.opacity = '1';

                }, 400);

                adIndex = index;

            }



            setTimeout(() => {

                adEl.style.display = 'block';

                adImg.src = adImages[adIndex];

            }, 1500);



            setInterval(() => {

                showAd((adIndex + 1) % adImages.length);

            }, 5000);

        })();

    </script>

</body>

</html>
