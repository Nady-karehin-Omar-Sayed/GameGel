<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Games - GameGel</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <style>
    .compare-container { max-width: 1200px; margin: 0 auto; padding: 100px 20px 60px; }
    .compare-header { text-align: center; margin-bottom: 32px; }
    .compare-header h1 { font-size: clamp(2rem, 4vw, 3rem); color: var(--accent-blue); margin-bottom: 10px; }
    .compare-header p { font-family: var(--mono-font); color: #c7d3e8; line-height: 1.8; }
    .compare-selector { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: end; background: rgba(10, 20, 40, 0.9); border: 1px solid rgba(58, 160, 255, 0.18); border-radius: 18px; padding: 28px; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18); }
    .compare-select-box { display: flex; flex-direction: column; gap: 10px; }
    .compare-select-box label { font-family: var(--main-font); color: var(--yellow); font-size: .82rem; text-transform: uppercase; letter-spacing: 1px; }
    .compare-select-box select { appearance: none; background: var(--base-bg); border: 1px solid rgba(58, 160, 255, 0.2); color: #eee; padding: 14px 16px; border-radius: 12px; font-family: var(--mono-font); font-size: .95rem; }
    .compare-vs-badge { font-family: var(--main-font); color: var(--yellow); font-size: 1.25rem; }
    .compare-btn-container { grid-column: 1 / -1; display: flex; justify-content: center; }
    .compare-btn { width: 100%; max-width: 240px; background: var(--accent-blue); color: var(--base-bg); border: none; border-radius: 14px; padding: 16px 18px; font-family: var(--main-font); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: transform .2s ease, background .2s ease; }
    .compare-btn:hover { background: #F8DE22; color: #000; transform: translateY(-2px); }
    .compare-games-section { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
    .compare-game-card { background: rgba(10, 20, 40, 0.94); border: 1px solid rgba(58, 160, 255, 0.18); border-radius: 18px; overflow: hidden; }
    .compare-game-image { width: 100%; height: 240px; overflow: hidden; }
    .compare-game-image img { width: 100%; height: 100%; object-fit: cover; }
    .compare-game-info { padding: 24px; }
    .compare-game-title { font-family: var(--main-font); font-size: 1.4rem; margin-bottom: 8px; color: var(--accent-blue); }
    .compare-game-developer, .compare-game-genre { font-family: var(--mono-font); color: #cbd6ef; font-size: .95rem; }
    .compare-game-genre { display: inline-flex; margin-top: 10px; padding: 6px 12px; border-radius: 999px; background: rgba(58, 160, 255, 0.12); border: 1px solid rgba(58, 160, 255, 0.16); }
    .compare-metrics { background: rgba(10, 20, 40, 0.92); border: 1px solid rgba(58, 160, 255, 0.18); border-radius: 18px; overflow: hidden; }
    .compare-metric-row { display: grid; grid-template-columns: 220px 1fr 1fr; gap: 0; padding: 18px 22px; border-bottom: 1px solid rgba(58, 160, 255, 0.08); align-items: center; }
    .compare-metric-row:last-child { border-bottom: none; }
    .compare-metric-label { font-family: var(--main-font); color: var(--yellow); text-transform: uppercase; letter-spacing: 1px; font-size: .82rem; }
    .compare-metric-value { font-family: var(--mono-font); color: #e6f2ff; text-align: center; }
    .compare-metric-value.winner { color: var(--accent-blue); font-weight: 700; }
    .compare-summary { background: linear-gradient(135deg, rgba(58, 160, 255, 0.1), rgba(248, 222, 34, 0.07)); border: 1px solid rgba(58, 160, 255, 0.16); border-radius: 18px; padding: 26px; text-align: center; }
    .compare-summary h2 { font-family: var(--main-font); color: var(--yellow); margin-bottom: 10px; }
    .compare-summary p { font-family: var(--mono-font); color: #d8e1f3; line-height: 1.7; }
    .empty-state { padding: 48px 26px; text-align: center; border-radius: 18px; background: rgba(255,255,255,.03); border: 1px dashed rgba(58, 160, 255, 0.18); color: #a5b5d7; font-family: var(--mono-font); }
    @media (max-width: 900px) { .compare-selector, .compare-games-section, .compare-metric-row { grid-template-columns: 1fr; } .compare-metric-row { gap: 12px; } .compare-metric-label, .compare-metric-value { text-align: left; } }
  </style>
</head>
<body>
    <div class="navbar"></div>

    <div class="compare-container">
        <!-- Header -->
        <div class="compare-header">
            <h1>Compare Games</h1>
            <p>Select two games and compare them side-by-side</p>
        </div>

        <!-- Selector -->
        <div class="compare-selector">
            <div class="compare-select-box">
                <label>Game 1</label>
                <select id="game1-select">
                    <option value="">Select a game...</option>
                </select>
            </div>
            <div class="compare-vs-badge">VS</div>
            <div class="compare-select-box">
                <label>Game 2</label>
                <select id="game2-select">
                    <option value="">Select a game...</option>
                </select>
            </div>
            <div class="compare-btn-container">
                <button class="compare-btn" onclick="performComparison()">Compare</button>
            </div>
        </div>

        <!-- Results Container -->
        <div id="compare-results">
            <div class="compare-empty">
                <p>🎮 Select two games and click Compare to begin</p>
            </div>
        </div>
    </div>

    <footer>
        <p class="head-font green">© 2026 GameGel. All rights reserved.</p>
    </footer>

    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/compare.js"></script>
    <script>
        // Initialize compare page
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('../assets/js/games.json');
                const games = await response.json();
                
                const select1 = document.getElementById('game1-select');
                const select2 = document.getElementById('game2-select');
                
                games.forEach((game, index) => {
                    const option1 = document.createElement('option');
                    option1.value = index;
                    option1.textContent = game.title;
                    select1.appendChild(option1);
                    
                    const option2 = document.createElement('option');
                    option2.value = index;
                    option2.textContent = game.title;
                    select2.appendChild(option2);
                });
                
                window.gamesDatabase = games;
            } catch (error) {
                console.error('Error loading games:', error);
            }
        });

        function performComparison() {
            const select1 = document.getElementById('game1-select');
            const select2 = document.getElementById('game2-select');
            const idx1 = parseInt(select1.value);
            const idx2 = parseInt(select2.value);
            
            if (isNaN(idx1) || isNaN(idx2)) {
                alert('Please select both games');
                return;
            }
            
            if (idx1 === idx2) {
                alert('Please select two different games');
                return;
            }
            
            if (!window.gamesDatabase) {
                alert('Games data not loaded');
                return;
            }
            
            const game1 = window.gamesDatabase[idx1];
            const game2 = window.gamesDatabase[idx2];
            
            const resultsDiv = document.getElementById('compare-results');
            resultsDiv.innerHTML = displayComparison(game1, game2);
            resultsDiv.classList.add('compare-result');
        }

        function displayComparison(game1, game2) {
            const getImageUrl = (game) => game.image || game.lsimg || 'https://placehold.co/400x280/111/3aa0ff?text=' + encodeURIComponent(game.title);
            
            const extractPrice = (priceStr) => {
                if (!priceStr || priceStr === 'N/A') return 999;
                const match = priceStr.match(/\d+\.?\d*/);
                return match ? parseFloat(match[0]) : 999;
            };
            
            const price1 = extractPrice(game1.price);
            const price2 = extractPrice(game2.price);
            
            const rating1 = parseFloat(game1.rating) || 7.5;
            const rating2 = parseFloat(game2.rating) || 7.5;
            
            const metrics = [
                {
                    label: 'Rating',
                    value1: (rating1 || '7.5').toFixed(1) + '/10',
                    value2: (rating2 || '7.5').toFixed(1) + '/10',
                    winner: rating1 > rating2 ? 1 : rating2 > rating1 ? 2 : 0,
                    type: 'higher'
                },
                {
                    label: 'Platforms',
                    value1: game1.platforms || 'N/A',
                    value2: game2.platforms || 'N/A',
                    winner: 0
                },
                {
                    label: 'Price',
                    value1: game1.price || 'N/A',
                    value2: game2.price || 'N/A',
                    winner: price1 < price2 ? 1 : price2 < price1 ? 2 : 0,
                    type: 'lower'
                },
                {
                    label: 'Genres',
                    value1: game1.genres || 'N/A',
                    value2: game2.genres || 'N/A',
                    winner: 0
                },
                {
                    label: 'Developer',
                    value1: game1.developer || 'N/A',
                    value2: game2.developer || 'N/A',
                    winner: 0
                }
            ];
            
            const winner = rating1 > rating2 ? game1 : rating2 > rating1 ? game2 : null;
            
            let html = `
                <div class="compare-games-section">
                    <div class="compare-game-card">
                        <div class="compare-game-image">
                            <img src="${getImageUrl(game1)}" alt="${game1.title}">
                        </div>
                        <div class="compare-game-info">
                            <div class="compare-game-title">${game1.title}</div>
                            <div class="compare-game-developer">${game1.developer || 'Unknown Developer'}</div>
                            <span class="compare-game-genre">${(game1.genres || 'N/A').split(',')[0]}</span>
                        </div>
                    </div>
                    <div class="compare-game-card">
                        <div class="compare-game-image">
                            <img src="${getImageUrl(game2)}" alt="${game2.title}">
                        </div>
                        <div class="compare-game-info">
                            <div class="compare-game-title">${game2.title}</div>
                            <div class="compare-game-developer">${game2.developer || 'Unknown Developer'}</div>
                            <span class="compare-game-genre">${(game2.genres || 'N/A').split(',')[0]}</span>
                        </div>
                    </div>
                </div>
                
                <div class="compare-metrics">
                    ${metrics.map(metric => `
                        <div class="compare-metric-row">
                            <div class="compare-metric-label">${metric.label}</div>
                            <div class="compare-metric-value ${metric.winner === 1 ? 'winner' : ''}">${metric.value1}</div>
                            <div class="compare-metric-value ${metric.winner === 2 ? 'winner' : ''}">${metric.value2}</div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="compare-verdict">
                    <div class="compare-verdict-title">
                        ${winner ? `🏆 ${winner.title} Wins!` : '🤝 Tie Game!'}
                    </div>
                    <div class="compare-verdict-text">
                        ${winner 
                            ? `${winner.title} has a higher rating (${(winner === game1 ? rating1 : rating2).toFixed(1)}/10) and is the better choice based on community ratings.`
                            : 'Both games are equally rated. Choose based on your preferences!'
                        }
                    </div>
                </div>
            `;
            
            return html;
        }
    </script>
    <script src="../assets/js/navbar.js"></script>
</body>
</html>
