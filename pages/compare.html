<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Games - GameGel</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
    <div class="navbar"></div>

    <div class="compare-container">
        <!-- Header -->
        <div class="compare-header">
            <h1>Compare Games</h1>
            <p>Select two games and compare them side-by-side</p>
        </div>

        <!-- Selector -->
        <div class="compare-selector">
            <div class="compare-select-box">
                <label>Game 1</label>
                <select id="game1-select">
                    <option value="">Select a game...</option>
                </select>
            </div>
            <div class="compare-vs-badge">VS</div>
            <div class="compare-select-box">
                <label>Game 2</label>
                <select id="game2-select">
                    <option value="">Select a game...</option>
                </select>
            </div>
            <div class="compare-btn-container">
                <button class="compare-btn" onclick="performComparison()">Compare</button>
            </div>
        </div>

        <!-- Results Container -->
        <div id="compare-results">
            <div class="compare-empty">
                <p>🎮 Select two games and click Compare to begin</p>
            </div>
        </div>
    </div>

    <footer>
        <p class="head-font green">© 2026 GameGel. All rights reserved.</p>
    </footer>

    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/compare.js"></script>
    <script>
        // Initialize compare page
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('../assets/js/games.json');
                const games = await response.json();
                
                const select1 = document.getElementById('game1-select');
                const select2 = document.getElementById('game2-select');
                
                games.forEach((game, index) => {
                    const option1 = document.createElement('option');
                    option1.value = index;
                    option1.textContent = game.title;
                    select1.appendChild(option1);
                    
                    const option2 = document.createElement('option');
                    option2.value = index;
                    option2.textContent = game.title;
                    select2.appendChild(option2);
                });
                
                window.gamesDatabase = games;
            } catch (error) {
                console.error('Error loading games:', error);
            }
        });

        function performComparison() {
            const select1 = document.getElementById('game1-select');
            const select2 = document.getElementById('game2-select');
            const idx1 = parseInt(select1.value);
            const idx2 = parseInt(select2.value);
            
            if (isNaN(idx1) || isNaN(idx2)) {
                alert('Please select both games');
                return;
            }
            
            if (idx1 === idx2) {
                alert('Please select two different games');
                return;
            }
            
            if (!window.gamesDatabase) {
                alert('Games data not loaded');
                return;
            }
            
            const game1 = window.gamesDatabase[idx1];
            const game2 = window.gamesDatabase[idx2];
            
            const resultsDiv = document.getElementById('compare-results');
            resultsDiv.innerHTML = displayComparison(game1, game2);
            resultsDiv.classList.add('compare-result');
        }

        function displayComparison(game1, game2) {
            const getImageUrl = (game) => game.image || game.lsimg || 'https://placehold.co/400x280/111/3aa0ff?text=' + encodeURIComponent(game.title);
            
            const extractPrice = (priceStr) => {
                if (!priceStr || priceStr === 'N/A') return 999;
                const match = priceStr.match(/\d+\.?\d*/);
                return match ? parseFloat(match[0]) : 999;
            };
            
            const price1 = extractPrice(game1.price);
            const price2 = extractPrice(game2.price);
            
            const rating1 = parseFloat(game1.rating) || 7.5;
            const rating2 = parseFloat(game2.rating) || 7.5;
            
            const metrics = [
                {
                    label: 'Rating',
                    value1: (rating1 || '7.5').toFixed(1) + '/10',
                    value2: (rating2 || '7.5').toFixed(1) + '/10',
                    winner: rating1 > rating2 ? 1 : rating2 > rating1 ? 2 : 0,
                    type: 'higher'
                },
                {
                    label: 'Platforms',
                    value1: game1.platforms || 'N/A',
                    value2: game2.platforms || 'N/A',
                    winner: 0
                },
                {
                    label: 'Price',
                    value1: game1.price || 'N/A',
                    value2: game2.price || 'N/A',
                    winner: price1 < price2 ? 1 : price2 < price1 ? 2 : 0,
                    type: 'lower'
                },
                {
                    label: 'Genres',
                    value1: game1.genres || 'N/A',
                    value2: game2.genres || 'N/A',
                    winner: 0
                },
                {
                    label: 'Developer',
                    value1: game1.developer || 'N/A',
                    value2: game2.developer || 'N/A',
                    winner: 0
                }
            ];
            
            const winner = rating1 > rating2 ? game1 : rating2 > rating1 ? game2 : null;
            
            let html = `
                <div class="compare-games-section">
                    <div class="compare-game-card">
                        <div class="compare-game-image">
                            <img src="${getImageUrl(game1)}" alt="${game1.title}">
                        </div>
                        <div class="compare-game-info">
                            <div class="compare-game-title">${game1.title}</div>
                            <div class="compare-game-developer">${game1.developer || 'Unknown Developer'}</div>
                            <span class="compare-game-genre">${(game1.genres || 'N/A').split(',')[0]}</span>
                        </div>
                    </div>
                    <div class="compare-game-card">
                        <div class="compare-game-image">
                            <img src="${getImageUrl(game2)}" alt="${game2.title}">
                        </div>
                        <div class="compare-game-info">
                            <div class="compare-game-title">${game2.title}</div>
                            <div class="compare-game-developer">${game2.developer || 'Unknown Developer'}</div>
                            <span class="compare-game-genre">${(game2.genres || 'N/A').split(',')[0]}</span>
                        </div>
                    </div>
                </div>
                
                <div class="compare-metrics">
                    ${metrics.map(metric => `
                        <div class="compare-metric-row">
                            <div class="compare-metric-label">${metric.label}</div>
                            <div class="compare-metric-value ${metric.winner === 1 ? 'winner' : ''}">${metric.value1}</div>
                            <div class="compare-metric-value ${metric.winner === 2 ? 'winner' : ''}">${metric.value2}</div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="compare-verdict">
                    <div class="compare-verdict-title">
                        ${winner ? `🏆 ${winner.title} Wins!` : '🤝 Tie Game!'}
                    </div>
                    <div class="compare-verdict-text">
                        ${winner 
                            ? `${winner.title} has a higher rating (${(winner === game1 ? rating1 : rating2).toFixed(1)}/10) and is the better choice based on community ratings.`
                            : 'Both games are equally rated. Choose based on your preferences!'
                        }
                    </div>
                </div>
            `;
            
            return html;
        }
    </script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/navbar.js"></script>
</body>
</html>
